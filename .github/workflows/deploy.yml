name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --yes \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope "team_gAvNy2HFkIdG3FYux6paLFju"
